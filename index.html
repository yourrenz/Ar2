<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>Rapunzel AR - Dikey Video</title>
    
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; font-family: monospace; }
      .mindar-ui-loading { display: none !important; }
      .mindar-ui-overlay { display: none !important; }

      /* DEBUG KONSOLU */
      #debug-console {
        position: fixed; bottom: 0; left: 0; width: 100%; height: 150px;
        background: rgba(0, 0, 0, 0.8); color: lime; 
        overflow-y: scroll; z-index: 99999; padding: 10px;
        font-size: 10px; border-top: 2px solid lime;
        pointer-events: none;
      }

      #start-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.9); z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        color: white;
      }
      #start-button {
        padding: 15px 30px; font-size: 18px; background: #ff4081; color: white;
        border: none; border-radius: 5px; cursor: pointer; margin-top: 20px;
      }
    </style>
  </head>
  <body>

    <div id="debug-console">
      <div>> Sistem Başlatılıyor... v1.0.8 (Dikey Mod)</div>
    </div>

    <div id="start-screen">
      <h1>Rapunzel AR</h1>
      <button id="start-button">BAŞLAT</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./media/targets.mind; uiScanning: no; uiLoading: no;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="rapunzelVideo" src="./media/video_rapunzel.mp4" preload="auto" loop="true" playsinline webkit-playsinline crossorigin="anonymous"></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="mytarget" mindar-image-target="targetIndex: 0">
        <a-video id="ar-video" src="#rapunzelVideo" width="1" height="1.78" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const debugConsole = document.getElementById('debug-console');
      function log(msg) {
        const div = document.createElement('div');
        div.innerText = "> " + msg;
        debugConsole.appendChild(div);
        debugConsole.scrollTop = debugConsole.scrollHeight;
        console.log(msg);
      }

      window.onerror = function(message, source, lineno, colno, error) {
        log("JS HATASI: " + message);
      };

      const startScreen = document.getElementById('start-screen');
      const startButton = document.getElementById('start-button');
      const video = document.getElementById('rapunzelVideo');
      const target = document.getElementById('mytarget');
      const scene = document.querySelector('a-scene');

      scene.addEventListener("arReady", () => log("AR Sistemi Hazır!"));
      scene.addEventListener("arError", (event) => log("AR HATASI: targets.mind yüklenemedi!"));

      video.addEventListener('loadeddata', () => log("Video yüklendi."));
      video.addEventListener('error', (e) => {
        log("VİDEO HATASI: Video dosyası bulunamadı veya format bozuk.");
        if(video.error) log("Hata Kodu: " + video.error.code);
      });

      startButton.addEventListener('click', () => {
        log("Butona basıldı. İzinler isteniyor...");
        startScreen.style.display = 'none';
        
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
          log("Video kilidi açıldı.");
        }).catch((e) => log("Video Oynatma İzni Bekleniyor: " + e.message));
      });

      target.addEventListener("targetFound", () => {
        log("HEDEF BULUNDU! Video Başlıyor.");
        video.play();
      });
      
      target.addEventListener("targetLost", () => {
        log("Hedef Kayboldu.");
        video.pause();
      });
    </script>
  </body>
</html>
